
name: Frontend Deploy CI

on:
  push:
    branches: [main]
    paths:
      - "docker-react/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OCI_SSH_KEY }}

      - name: Deploy React App
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} '
            export NVM_DIR="$HOME/.nvm";
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh";

            cd "$HOME/project/portfolio" &&
            git pull --ff-only &&
            npm install &&
            npm run build &&

            sudo rm -rf /var/www/react-portfolio/* &&
            sudo cp -r dist/* /var/www/react-portfolio/ &&

            sudo chown -R www-data:www-data /var/www/react-portfolio &&
            sudo chmod -R 755 /var/www/react-portfolio &&

            sudo nginx -t &&
            sudo systemctl reload nginx
          '
